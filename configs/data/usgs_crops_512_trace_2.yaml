# @package data
# Dataset configuration for USGS/OSM 512px crops (trace 2.0 roads)

data_root: "${oc.env:DATA_ROOT,/shared/femiani_shared/data/usgs_crops_512_trace_2_NAIP}"
image_size: 512              # pixels per side
gsd_m: 1.0                   # ground sample distance (metres per pixel)
max_gt_segments: 800         # post-densification p99=710 measured on val; samples above are dropped (not truncated)
max_segment_length: 0.06     # max normalised segment length before densification (~15 m at 1m/px)
densify: true

# Optional dataset-quality filtering for vector flow training.
# Filters are applied before max_train_samples/max_val_samples subsetting.
min_valid_features_train: 0   # using exclusion_csv_path as primary train-skip list
min_valid_features_val: 0     # keep validation unfiltered for unbiased evaluation
max_valid_features_train: 0   # 0 disables dense-outlier filtering (set >0 to enable)
max_valid_features_val: 0
filter_nodata: false          # handled by exclusion_csv_path
nodata_threshold: 0.30        # matches segmentation no-data filter (30%)
nodata_white_threshold: 250   # pixel > 250 in all channels counts as near-white
nodata_black_threshold: 5     # pixel < 5 in all channels counts as near-black
use_exclusion_csv: true
exclusion_csv_path: "${paths.exclusion_csv}"

max_train_samples: null      # null = use all
max_val_samples: null        # null = use all (4241 images)
